model:
  backbone: efficientnet_b0
  pretrained: true
  dropout1: 0.4
  dropout2: 0.3
  hidden_dim: 512
  num_classes: 5

training:
  image_size: 224
  batch_size: 16
  stage1_lr: 0.001
  stage2_lr: 0.00001
  weight_decay: 0.0001
  stage1_epochs: 5
  stage2_epochs: 15
  early_stopping_patience: 5
  seed: 42
  optimizer: adamw
  scheduler: cosine_annealing

data:
  data_dir: data/aptos2019/
  img_dir: data/aptos2019/train_images/
  output_dir: outputs/
  checkpoint_dir: checkpoints/
  train_split: 0.8
  val_split: 0.2

preprocessing:
  ben_graham: true
  sigma: 30

augmentation:
  random_horizontal_flip: true
  random_vertical_flip: true
  random_rotation: 15
  color_jitter: true
